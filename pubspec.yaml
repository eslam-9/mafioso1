name: mafioso
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any
  easy_localization: ^3.0.4
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.7.0
  
  # Navigation
  # Using onGenerateRoute instead of go_router
  
  # HTTP & API
  dio: ^5.7.0
  
  # Animations
  flutter_animate: ^4.5.0
  
  # Audio
  audioplayers: ^6.1.0
  
  # Fonts
  google_fonts: ^6.2.1
  
  # Connectivity
  connectivity_plus: ^6.1.0
  
  # Local Storage
  shared_preferences: ^2.3.3

  # Responsive Design
  flutter_screenutil: ^5.9.0
  uuid: ^4.5.3
  crypto: ^3.0.7
  supabase_flutter: ^2.12.4
  json_annotation: 4.9.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4


dev_dependencies:
  build_runner: any
  hive_ce_generator: any
  json_serializable: any
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: any

  custom_lint: any
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1
  bloc_test: ^9.1.6

flutter_launcher_icons:
  android: true
  image_path_android: assets/images/logo.png
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: assets/images/logo.png

flutter_native_splash:
  android: true
  ios: false
  web: false

  color: "#0D0D0D"
  image: assets/images/logo.png

  android_12:
    color: "#0D0D0D"
    image: assets/images/logo.png  


flutter:
  uses-material-design: true
  
  assets:
    - assets/audio/
    - assets/images/
    - assets/data/
    - assets/data/stories_offline_en.json
    - assets/translations/
